name: Discord Issue Comment Notify

on:
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Discord
        run: |
          CONTENT=$(jq -r '
            "💬 **New Issue Comment**\n\n" +
            "Repo: \(.repository.full_name)\n\n" +
            "Issue #\(.issue.number) - \(.issue.title)\n" +
            "User: \(.comment.user.login)\n\n" +
            "Comment:\n\(.comment.body)\n\n" +
            "🔗 \(.comment.html_url)"
          ' "$GITHUB_EVENT_PATH")

          jq -n --arg content "$CONTENT" '{content: $content}' > payload.json

          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d @payload.json
