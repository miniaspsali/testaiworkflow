name: Discord Issue Comment Notify

on:
  issue_comment:
    types: [created]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send message
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "content": "💬 **New Issue Comment**\n\nRepo: ${{ github.repository }}\n\nIssue #${{ github.event.issue.number }} - ${{ github.event.issue.title }}\nUser: ${{ github.event.comment.user.login }}\n\nComment:\n${{ github.event.comment.body }}\n\n🔗 ${{ github.event.comment.html_url }}"
          }'
